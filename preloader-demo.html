<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ANRF-PAIR | Preloader Demo</title>
  <meta name="description" content="ANRF-PAIR Project — SVG stroke-dashoffset preloader animation demo.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; font-family:'Montserrat',sans-serif; }
    body { background:#f4f2f9; }

    /* ==================================================
       PRELOADER OVERLAY
    ================================================== */
    #preloader {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #ffffff;
      z-index: 9999;
      opacity: 1; visibility: visible;
      transition: opacity 600ms ease-in-out, visibility 600ms ease-in-out;
    }
    #preloader.fade-out {
      opacity: 0; visibility: hidden; pointer-events: none;
    }

    /* ==================================================
       SVG CANVAS
    ================================================== */
    #preloader .preloader-logo-container {
      width: clamp(220px, 38vmin, 360px);
      height: auto; display: block;
    }
    #preloader svg {
      width: 100%; height: auto; display: block; overflow: visible;
    }

    /* ==================================================
       CONCENTRIC ARCS — shared
       All lower semicircles, centre (200, 118).
       M (200-r) 118  A r r 0 0 1 (200+r) 118
       stroke-dasharray = pi*r
         Arc  r    dasharray
          1  155     487   <- first
          2  125     393
          3   95     298
          4   65     204
          5   35     110   <- last
    ================================================== */
    .pl-arc {
      fill: none;
      stroke: #b8aed4;
      stroke-width: 7;
      stroke-linecap: round;
      animation-name: pl-draw-arc;
      animation-duration: 850ms;
      animation-timing-function: cubic-bezier(0.37, 0, 0.63, 1);
      animation-fill-mode: both;
    }
    .pl-arc-1 { stroke-dasharray:487; stroke-dashoffset:487; animation-delay:  0ms; }
    .pl-arc-2 { stroke-dasharray:393; stroke-dashoffset:393; animation-delay:150ms; }
    .pl-arc-3 { stroke-dasharray:298; stroke-dashoffset:298; animation-delay:300ms; }
    .pl-arc-4 { stroke-dasharray:204; stroke-dashoffset:204; animation-delay:450ms; }
    .pl-arc-5 { stroke-dasharray:110; stroke-dashoffset:110; animation-delay:600ms; }
    @keyframes pl-draw-arc { to { stroke-dashoffset:0; } }

    /* ==================================================
       RED DOT — elastic pop at t=1500ms
    ================================================== */
    .pl-dot {
      transform-box: fill-box;
      transform-origin: center;
      transform: scale(0);
      animation: pl-pop-dot 650ms cubic-bezier(0.34, 1.56, 0.64, 1) 1500ms both;
    }
    @keyframes pl-pop-dot {
      0%   { transform: scale(0); }
      100% { transform: scale(1); }
    }

    /* ==================================================
       "ANRF-PAIR" TEXT — fade + rise at t=1900ms
    ================================================== */
    .pl-text {
      transform-box: fill-box;
      transform-origin: center;
      opacity: 0;
      animation: pl-fade-text 550ms ease-out 1900ms both;
    }
    @keyframes pl-fade-text {
      from { opacity:0; transform:translateY(5px); }
      to   { opacity:1; transform:translateY(0);   }
    }

    /* Demo replay button */
    #replay-btn {
      position:fixed; bottom:28px; right:28px;
      padding:10px 22px;
      background:#7c6fb0; color:#fff;
      border:none; border-radius:50px;
      font-family:'Montserrat',sans-serif;
      font-weight:700; font-size:13px; letter-spacing:.05em;
      cursor:pointer;
      box-shadow:0 4px 18px rgba(124,111,176,.35);
      transition:background 200ms,transform 150ms;
      z-index:10000;
    }
    #replay-btn:hover  { background:#6355a0; transform:translateY(-1px); }
    #replay-btn:active { transform:translateY(0); }
  </style>
</head>
<body>

  <div id="preloader" role="status" aria-label="Loading ANRF-PAIR, please wait">
    <div class="preloader-logo-container">
      <!--
        viewBox: 0 0 400 300
        Arc centre: (200, 118)
        Animation:  outside-in cascade, 150ms stagger per arc
      -->
      <svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">

        <defs>
          <!-- Shiny-sphere red gradient matching the logo dot -->
          <radialGradient id="pl-dot-grad" cx="36%" cy="30%" r="68%">
            <stop offset="0%"   stop-color="#ff5252"/>
            <stop offset="50%"  stop-color="#c62828"/>
            <stop offset="100%" stop-color="#7b0000"/>
          </radialGradient>
        </defs>

        <!-- Arc 1 — outermost — r=155, dasharray=487 -->
        <path class="pl-arc pl-arc-1" d="M 45 118 A 155 155 0 0 0 355 118"/>
        <!-- Arc 2 — r=125, dasharray=393 -->
        <path class="pl-arc pl-arc-2" d="M 75 118 A 125 125 0 0 0 325 118"/>
        <!-- Arc 3 — r=95, dasharray=298 -->
        <path class="pl-arc pl-arc-3" d="M 105 118 A 95 95 0 0 0 295 118"/>
        <!-- Arc 4 — r=65, dasharray=204 -->
        <path class="pl-arc pl-arc-4" d="M 135 118 A 65 65 0 0 0 265 118"/>
        <!-- Arc 5 — innermost — r=35, dasharray=110 -->
        <path class="pl-arc pl-arc-5" d="M 165 118 A 35 35 0 0 0 235 118"/>

        <!-- Red centre dot — elastic pop at t=1500ms -->
        <circle class="pl-dot" cx="200" cy="118" r="20" fill="url(#pl-dot-grad)"/>

        <!-- ANRF-PAIR logotype — fade + rise at t=1900ms -->
        <text class="pl-text"
              x="200" y="67"
              text-anchor="middle"
              font-family="'Montserrat','Arial Black',Arial,sans-serif"
              font-weight="900"
              font-size="54"
              fill="#111111"
              letter-spacing="-1.5">ANRF-PAIR</text>

      </svg>
    </div>
  </div>

  <button id="replay-btn" aria-label="Replay preloader animation">&#8635;&nbsp; Replay</button>

  <script>
    (function () {
      'use strict';
      var MIN_MS  = 2700;
      var t0      = performance.now();

      function dismiss() {
        var remaining = Math.max(0, MIN_MS - (performance.now() - t0));
        setTimeout(function () {
          var el = document.getElementById('preloader');
          if (!el) return;
          el.classList.add('fade-out');
          el.addEventListener('transitionend', function h(e) {
            if (e.propertyName !== 'opacity') return;
            el.removeEventListener('transitionend', h);
            el.style.display = 'none';
          });
        }, remaining);
      }

      if (document.readyState === 'complete') { dismiss(); }
      else { window.addEventListener('load', dismiss, {once:true}); }

      /* Replay button */
      document.addEventListener('DOMContentLoaded', function () {
        document.getElementById('replay-btn').addEventListener('click', function () {
          var el = document.getElementById('preloader');
          el.classList.remove('fade-out');
          el.style.display = '';
          el.querySelectorAll('.pl-arc,.pl-dot,.pl-text').forEach(function (n) {
            n.style.animation = 'none';
            n.offsetHeight; /* force reflow */
            n.style.animation = '';
          });
          t0 = performance.now();
          dismiss();
        });
      });
    }());
  </script>
</body>
</html>
